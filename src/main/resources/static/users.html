<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User List</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .users-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 28px 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 2rem;
            color: #333;
            margin: 0;
        }

        .back-btn {
            padding: 10px 20px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.3s ease;
        }

        .back-btn:hover {
            background-color: #5a6268;
        }

        .users-table-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .users-table th {
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .users-table td {
            padding: 14px 4px;
            border-bottom: 1px solid #eee;
            color: #555;
        }

        .users-table tbody tr:hover {
            background-color: #f8f9fa;
        }

        .users-table tbody tr:last-child td {
            border-bottom: none;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 1.1rem;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            text-align: center;
            padding: 60px 20px;
            color: #dc3545;
            font-size: 1.1rem;
        }

        .error-message .error-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .no-users {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .no-users .empty-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .refresh-btn {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            margin-left: 10px;
            transition: background-color 0.3s ease;
        }

        .refresh-btn:hover {
            background-color: #218838;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
        }

        .edit-btn, .delete-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            min-width: 70px;
            justify-content: center;
        }

        .edit-btn {
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(23, 162, 184, 0.3);
        }

        .edit-btn:hover {
            background: linear-gradient(135deg, #138496 0%, #117a8b 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(23, 162, 184, 0.4);
        }

        .edit-btn:active {
            transform: translateY(0);
        }

        .delete-btn {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(220, 53, 69, 0.3);
        }

        .delete-btn:hover {
            background: linear-gradient(135deg, #c82333 0%, #bd2130 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.4);
        }

        .delete-btn:active {
            transform: translateY(0);
        }

        .delete-btn:disabled {
            background: linear-gradient(135deg, #ccc 0%, #b3b3b3 100%);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .checkbox-cell {
            width: 40px;
            text-align: center;
        }

        .select-all-cell {
            width: 40px;
            text-align: center;
        }

        .delete-selected-btn {
            padding: 10px 20px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            margin-left: 10px;
            transition: all 0.3s ease;
            display: none;
        }

        .delete-selected-btn:hover {
            background-color: #c82333;
        }

        .delete-selected-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .page-header h1 {
                font-size: 1.5rem;
            }

            .page-header > div {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                width: 100%;
            }

            .page-header > div a,
            .page-header > div button {
                flex: 1;
                min-width: 120px;
                justify-content: center;
                text-align: center;
            }

            /* Hide table on mobile */
            .users-table {
                display: none;
            }

            /* Show card view on mobile */
            .mobile-card-view {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            /* Mobile select all bar */
            .mobile-select-all-bar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 16px;
                background: white;
                border-radius: 12px;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
                margin-bottom: 8px;
            }

            .mobile-select-all-label {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 0.95rem;
                font-weight: 500;
                color: #333;
                cursor: pointer;
            }

            .mobile-select-all-label input[type="checkbox"] {
                width: 22px;
                height: 22px;
                cursor: pointer;
            }

            .mobile-selection-count {
                font-size: 0.85rem;
                color: #666;
            }

            .user-card {
                background: white;
                border-radius: 12px;
                padding: 16px;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
                position: relative;
            }

            .user-card-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 12px;
            }

            .user-card-name {
                font-size: 1.1rem;
                font-weight: 600;
                color: #333;
            }

            .user-card-id {
                font-size: 0.75rem;
                color: #999;
                background: #f0f0f0;
                padding: 2px 8px;
                border-radius: 4px;
            }

            .user-card-details {
                display: flex;
                flex-direction: column;
                gap: 8px;
                margin-bottom: 12px;
            }

            .user-card-detail {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 0.9rem;
                color: #555;
            }

            .user-card-detail .icon {
                font-size: 1rem;
                min-width: 20px;
            }

            .user-card-actions {
                display: flex;
                gap: 10px;
                padding-top: 12px;
                border-top: 1px solid #eee;
            }

            .user-card-actions .edit-btn,
            .user-card-actions .delete-btn {
                flex: 1;
                padding: 10px;
                justify-content: center;
            }

            .user-card-checkbox {
                position: absolute;
                top: 16px;
                right: 16px;
            }

            .user-card-checkbox input[type="checkbox"] {
                width: 22px;
                height: 22px;
                cursor: pointer;
            }

            /* Improve touch targets on mobile */
            .edit-btn, .delete-btn {
                padding: 12px 16px;
                font-size: 0.9rem;
                min-height: 44px;
            }

            /* Adjust container padding on mobile */
            .users-container {
                padding: 16px 12px;
            }

            /* Add some spacing for the no-users, loading, and error states on mobile */
            .loading, .error-message, .no-users {
                padding: 40px 16px;
            }
        }

        @media (min-width: 769px) {
            .mobile-card-view {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="users-container">
        <div class="page-header">
            <h1>All Users</h1>
            <div>
                <button class="refresh-btn" id="refreshBtn" style="display: none;">↻ Refresh</button>
                <button class="delete-selected-btn" id="deleteSelectedBtn" onclick="deleteSelectedUsers()" style="display: none;">🗑 Delete Selected</button>
                <a href="index.html" class="back-btn">← Back to Registration</a>
            </div>
        </div>

        <div class="users-table-wrapper" id="usersContent">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading users...</p>
            </div>
        </div>
    </div>

    <script src="users.js"></script>
</body>
</html>
